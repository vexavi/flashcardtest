<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Don't Forget Cards</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(17, 24, 39, .92);
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #38bdf8;
      --good: #22c55e;
      --bad: #ef4444;
      --border: #334155;
      --shadow: 0 12px 30px rgba(0,0,0,.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a 25%, #0b1220 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.8rem, 2.5vw, 2.8rem);
      line-height: 1.05;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }
    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .panel-header h2,
    .panel-header h3 {
      margin: 0;
      font-size: 1rem;
    }
    .panel-body { padding: 16px; }
    .btn {
      border: 1px solid var(--border);
      background: #1e293b;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: .15s ease;
      font-weight: 600;
    }
    .btn:hover { transform: translateY(-1px); border-color: #475569; }
    .btn:active { transform: translateY(0); }
    .btn.primary { background: linear-gradient(180deg, #0ea5e9, #0284c7); border-color: #0284c7; }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .muted { color: var(--muted); }
    .status-line { color: var(--muted); font-size: .92rem; }
    .decks { display: grid; gap: 10px; }
    .deck-item {
      border: 1px solid var(--border);
      background: #0b1220;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: .16s ease;
      font-weight: 700;
    }
    .deck-item:hover { border-color: #475569; transform: translateY(-1px); }
    .deck-item.active {
      border-color: rgba(56, 189, 248, .7);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, .4);
      background: linear-gradient(180deg, rgba(14,165,233,.12), rgba(14,165,233,.03));
    }
    .main-grid {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 18px;
    }
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .summary-card {
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }
    .summary-card .label {
      color: var(--muted);
      font-size: .88rem;
      margin-bottom: 8px;
    }
    .summary-card .value {
      font-size: 1.8rem;
      font-weight: 800;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }
    .toolbar-left, .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      min-height: 24px;
    }
    .study-shell { display: grid; gap: 16px; }
    .prompt-card {
      min-height: 260px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: radial-gradient(circle at top, rgba(56,189,248,.1), transparent 35%), #0b1220;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .prompt-label {
      color: var(--muted);
      font-size: .92rem;
      margin-bottom: 12px;
    }
    .prompt-word {
      max-width: 760px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: clamp(1.5rem, 2.8vw, 2.4rem);
      font-weight: 800;
    }
    .answer-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .answer-input {
      flex: 1 1 280px;
      min-width: 0;
      background: #0f172a;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
    }
    .answer-input:focus {
      outline: none;
      border-color: rgba(56, 189, 248, .9);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, .15);
    }
    .progress-line {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: .92rem;
    }
    .feedback-box {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255,255,255,.02);
      line-height: 1.6;
    }
    .feedback-box.good {
      border-color: rgba(34, 197, 94, .35);
      background: rgba(34, 197, 94, .08);
    }
    .feedback-box.bad {
      border-color: rgba(239, 68, 68, .35);
      background: rgba(239, 68, 68, .08);
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      text-align: left;
    }
    th {
      color: var(--muted);
      font-size: .9rem;
      background: #111827;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:hover td { background: rgba(255,255,255,.02); }
    .empty, .notice {
      padding: 28px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.01);
    }
    .warning {
      border: 1px solid rgba(245, 158, 11, .3);
      background: rgba(245, 158, 11, .08);
      color: #fde68a;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: .92rem;
      margin-bottom: 12px;
    }
    .error {
      border: 1px solid rgba(239, 68, 68, .35);
      background: rgba(239, 68, 68, .08);
      color: #fecaca;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: .92rem;
      margin-bottom: 12px;
    }
    .hidden { display: none !important; }
    .center-action {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }
    @media (max-width: 1040px) {
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .summary-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .prompt-card { min-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title-wrap">
        <h1>Don't Forget Cards</h1>
      </div>
      <div class="top-actions">
        <button class="btn" id="resetProgressBtn">Reset Progress</button>
      </div>
    </div>

    <div class="layout">
      <aside class="panel">
        <div class="panel-header">
          <h2>Decks</h2>
          <span class="status-line" id="deckStatusText">Loading...</span>
        </div>
        <div class="panel-body">
          <div id="deckWarning" class="warning hidden"></div>
          <div id="deckError" class="error hidden"></div>
          <div class="decks" id="deckList"></div>
        </div>
      </aside>

      <main class="main-grid">
        <section class="panel">
          <div class="panel-body">
            <div class="toolbar">
              <div class="toolbar-left">
                <strong id="currentDeckName">No deck selected</strong>
              </div>
              <div class="toolbar-right">
                <span class="status-line" id="syncStatus">Not loaded yet</span>
              </div>
            </div>
          </div>
        </section>

        <section class="summary-row">
          <div class="summary-card">
            <div class="label">Total cards</div>
            <div class="value" id="totalCardsStat">0</div>
          </div>
          <div class="summary-card">
            <div class="label">Remaining</div>
            <div class="value" id="remainingCardsStat">0</div>
          </div>
          <div class="summary-card">
            <div class="label">Finished</div>
            <div class="value" id="finishedCardsStat">0</div>
          </div>
          <div class="summary-card">
            <div class="label">Studied today</div>
            <div class="value" id="studiedTodayStat">0</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h3>Study</h3>
          </div>
          <div class="panel-body">
            <div id="studyEmpty" class="empty">
              <div id="studyEmptyMessage">Waiting for deck data.</div>
              <div class="center-action">
                <button class="btn primary hidden" id="centerStartBtn">Let's Practice!</button>
              </div>
            </div>

            <div id="studyArea" class="study-shell hidden">
              <div class="prompt-card">
                <div>
                  <div class="prompt-label">Type the translation</div>
                  <div class="prompt-word" id="promptWord">Word</div>
                </div>
              </div>

              <div class="progress-line">
                <span id="cardProgressText">Right: 0 / 3</span>
                <span>•</span>
                <span id="sessionProgressText">0 cards in session queue</span>
              </div>

              <div class="answer-row">
                <input id="answerInput" class="answer-input" type="text" placeholder="Type the answer here" autocomplete="off" spellcheck="false" />
                <button class="btn primary" id="submitAnswerBtn">Submit</button>
                <button class="btn" id="nextCardBtn">Next Card</button>
              </div>

              <div id="feedbackBox" class="feedback-box hidden"></div>
            </div>
          </div>
        </section>

        <section class="panel" id="cardsPanel">
          <div class="panel-header">
            <h3>Cards in This Deck</h3>
            <div>
              <input id="searchInput" class="answer-input" type="text" placeholder="Search cards" style="width:220px; padding:10px 12px;" />
            </div>
          </div>
          <div class="panel-body">
            <div id="cardTableEmpty" class="empty">No cards loaded.</div>
            <div class="table-wrap hidden" id="cardTableWrap">
              <table>
                <thead>
                  <tr>
                    <th style="width:34%;">Prompt</th>
                    <th>Answer</th>
                    <th style="width:14%;">Right</th>
                    <th style="width:14%;">Wrong</th>
                  </tr>
                </thead>
                <tbody id="cardTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const MASTER_DECK_URL = './cards.json';
    const PROGRESS_KEY = 'dont_forget_cards_v1';

    const appState = {
      masterDecks: [],
      selectedDeckId: null,
      progress: { cards: {}, dailyStats: {} },
      studyQueue: [],
      activeStudyCardId: null,
      sessionStarted: false,
      awaitingNext: false,
      feedback: null,
      today: todayKey(),
      loading: false,
      loadError: '',
      missingIdCount: 0,
      lastLoadedAt: null
    };

    function todayKey(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDateTime(iso) {
      if (!iso) return 'Not loaded yet';
      const d = new Date(iso);
      return `Last synced: ${d.toLocaleString()}`;
    }

    function defaultProgress() {
      return {
        correctCount: 0,
        attempts: 0,
        wrongAttempts: 0,
        finished: false,
        lastReviewed: null,
        lastResult: null
      };
    }

    function saveProgress() {
      localStorage.setItem(PROGRESS_KEY, JSON.stringify({
        selectedDeckId: appState.selectedDeckId,
        progress: appState.progress
      }));
    }

    function loadProgress() {
      const raw = localStorage.getItem(PROGRESS_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        appState.selectedDeckId = parsed.selectedDeckId || null;
        appState.progress = parsed.progress || { cards: {}, dailyStats: {} };
      } catch {
        appState.selectedDeckId = null;
        appState.progress = { cards: {}, dailyStats: {} };
      }
    }

    function getSelectedDeck() {
      return appState.masterDecks.find(deck => deck.id === appState.selectedDeckId) || null;
    }

    function getCardProgress(cardId) {
      return { ...defaultProgress(), ...(appState.progress.cards[cardId] || {}) };
    }

    function getCardsWithProgress(deck) {
      if (!deck) return [];
      return deck.cards.map(card => ({ ...card, ...getCardProgress(card.id) }));
    }

    function getCardById(deck, cardId) {
      if (!deck) return null;
      const card = deck.cards.find(item => item.id === cardId);
      if (!card) return null;
      return { ...card, ...getCardProgress(card.id) };
    }

    function getRemainingCards(deck) {
      return getCardsWithProgress(deck).filter(card => !card.finished);
    }

    function getFinishedCount(deck) {
      return getCardsWithProgress(deck).filter(card => card.finished).length;
    }

    function getStudiedToday(deckId) {
      return appState.progress.dailyStats?.[deckId]?.[appState.today] || 0;
    }

    function incrementStudiedToday(deckId) {
      if (!appState.progress.dailyStats[deckId]) appState.progress.dailyStats[deckId] = {};
      appState.progress.dailyStats[deckId][appState.today] = (appState.progress.dailyStats[deckId][appState.today] || 0) + 1;
    }

    function normalizeDeckData(data) {
      appState.missingIdCount = 0;
      const sourceDecks = Array.isArray(data?.decks) ? data.decks : [];
      return sourceDecks
        .map((deck, deckIndex) => {
          const deckId = String(deck?.id || `deck-${deckIndex + 1}`);
          const deckName = String(deck?.name || `Deck ${deckIndex + 1}`);
          const sourceCards = Array.isArray(deck?.cards) ? deck.cards : [];
          const cards = sourceCards
            .map((card, cardIndex) => {
              let cardId = card?.id;
              if (!cardId) {
                cardId = `${deckId}__auto_${cardIndex + 1}`;
                appState.missingIdCount += 1;
              }
              return {
                id: String(cardId),
                front: String(card?.front ?? ''),
                back: String(card?.back ?? '')
              };
            })
            .filter(card => card.front.trim() || card.back.trim());
          return { id: deckId, name: deckName, cards };
        })
        .filter(deck => deck.cards.length > 0);
    }


    function saveDeckCache(rawData) {
      try {
        localStorage.setItem(DECK_CACHE_KEY, JSON.stringify({
          savedAt: new Date().toISOString(),
          data: rawData
        }));
      } catch {
        // ignore cache write errors
      }
    }

    function loadDeckCache() {
      try {
        const raw = localStorage.getItem(DECK_CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed?.data ?? null;
      } catch {
        return null;
      }
    }

    async function loadMasterDecks() {
      appState.loading = true;
      appState.loadError = '';

      const cachedData = loadDeckCache();
      if (cachedData) {
        appState.masterDecks = normalizeDeckData(cachedData);
        if (!appState.selectedDeckId || !appState.masterDecks.some(deck => deck.id === appState.selectedDeckId)) {
          appState.selectedDeckId = appState.masterDecks[0]?.id || null;
        }
        appState.lastLoadedAt = new Date().toISOString();
      }

      render();

      try {
        const res = await fetch(MASTER_DECK_URL, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        appState.masterDecks = normalizeDeckData(data);
        saveDeckCache(data);
        if (!appState.selectedDeckId || !appState.masterDecks.some(deck => deck.id === appState.selectedDeckId)) {
          appState.selectedDeckId = appState.masterDecks[0]?.id || null;
        }
        resetSessionState(false);
        appState.lastLoadedAt = new Date().toISOString();
        saveProgress();
      } catch (error) {
        if (!cachedData) {
          appState.masterDecks = [];
          resetSessionState(false);
          appState.loadError = `Could not load cards.json. Make sure the file exists in the same folder as this HTML file. (${error.message})`;
        }
      } finally {
        appState.loading = false;
        render();
      }
    }

    function resetSessionState(shouldRender = true) {
      appState.studyQueue = [];
      appState.activeStudyCardId = null;
      appState.sessionStarted = false;
      appState.awaitingNext = false;
      appState.feedback = null;
      const answerInput = document.getElementById('answerInput');
      if (answerInput) answerInput.value = '';
      if (shouldRender) render();
    }

    function startStudy() {
      const deck = getSelectedDeck();
      if (!deck) return;
      const remaining = getRemainingCards(deck);
      appState.studyQueue = remaining.map(card => card.id);
      appState.activeStudyCardId = appState.studyQueue[0] || null;
      appState.sessionStarted = remaining.length > 0;
      appState.awaitingNext = false;
      appState.feedback = null;
      const answerInput = document.getElementById('answerInput');
      if (answerInput) answerInput.value = '';
      render();
    }

    function updateStoredCardProgress(cardId, partial) {
      appState.progress.cards[cardId] = {
        ...defaultProgress(),
        ...(appState.progress.cards[cardId] || {}),
        ...partial
      };
    }

    function normalizeAnswer(value) {
      return String(value ?? '')
        .normalize('NFKC')
        .trim()
        .replace(/\s+/g, ' ')
        .toLowerCase();
    }

    function submitAnswer() {
      if (appState.awaitingNext) return;
      const deck = getSelectedDeck();
      const answerInput = document.getElementById('answerInput');
      if (!deck || !answerInput || !appState.activeStudyCardId) return;
      const card = getCardById(deck, appState.activeStudyCardId);
      if (!card) return;
      const userAnswer = answerInput.value.trim();
      if (!userAnswer) return;

      const progress = getCardProgress(card.id);
      appState.studyQueue.shift();

      const correct = normalizeAnswer(userAnswer) === normalizeAnswer(card.back);
      progress.attempts += 1;
      progress.lastReviewed = new Date().toISOString();
      progress.lastResult = correct ? 'correct' : 'wrong';

      if (correct) {
        progress.correctCount += 1;
        if (progress.correctCount >= 3) {
          progress.finished = true;
          appState.feedback = {
            type: 'good',
            html: `Correct! <strong>${escapeHtml(card.back)}</strong> is right. This card is now finished.`
          };
        } else {
          appState.studyQueue.push(card.id);
          appState.feedback = {
            type: 'good',
            html: `Correct! <strong>${escapeHtml(card.back)}</strong> is right. This card is now at ${progress.correctCount} / 3.`
          };
        }
      } else {
        progress.wrongAttempts += 1;
        appState.studyQueue.push(card.id);
        appState.feedback = {
          type: 'bad',
          html: `Not quite. The correct answer is <strong>${escapeHtml(card.back)}</strong>. This card goes back into the deck.`
        };
      }

      updateStoredCardProgress(card.id, progress);
      incrementStudiedToday(deck.id);
      appState.awaitingNext = true;
      saveProgress();
      render();
    }

    function nextCard() {
      appState.activeStudyCardId = appState.studyQueue[0] || null;
      appState.awaitingNext = false;
      appState.feedback = null;
      if (!appState.activeStudyCardId) {
        appState.sessionStarted = false;
      }
      const answerInput = document.getElementById('answerInput');
      if (answerInput) answerInput.value = '';
      render();
      const freshInput = document.getElementById('answerInput');
      if (freshInput && !freshInput.disabled) freshInput.focus();
    }

    function resetProgress() {
      const ok = confirm('Reset all study progress on this device?');
      if (!ok) return;
      appState.progress = { cards: {}, dailyStats: {} };
      resetSessionState(false);
      saveProgress();
      render();
    }

    function renderDeckList() {
      const list = document.getElementById('deckList');
      const status = document.getElementById('deckStatusText');
      const warning = document.getElementById('deckWarning');
      const error = document.getElementById('deckError');
      list.innerHTML = '';
      error.classList.toggle('hidden', !appState.loadError);
      error.textContent = appState.loadError;

      if (appState.missingIdCount > 0) {
        warning.classList.remove('hidden');
        warning.textContent = `${appState.missingIdCount} card(s) were missing an id and got an automatic temporary id. Progress may break if those cards move around. Give every card a stable id in cards.json.`;
      } else {
        warning.classList.add('hidden');
        warning.textContent = '';
      }

      if (appState.loading) {
        status.textContent = 'Loading...';
      } else if (appState.loadError) {
        status.textContent = 'Load failed';
      } else {
        status.textContent = `${appState.masterDecks.length} deck${appState.masterDecks.length === 1 ? '' : 's'}`;
      }

      if (appState.masterDecks.length === 0) {
        list.innerHTML = '<div class="notice">No decks available yet.</div>';
        return;
      }

      appState.masterDecks.forEach(deck => {
        const item = document.createElement('div');
        item.className = 'deck-item' + (deck.id === appState.selectedDeckId ? ' active' : '');
        item.textContent = deck.name;
        item.addEventListener('click', () => {
          appState.selectedDeckId = deck.id;
          resetSessionState(false);
          saveProgress();
          render();
        });
        list.appendChild(item);
      });
    }

    function renderStats() {
      const deck = getSelectedDeck();
      document.getElementById('currentDeckName').textContent = deck ? deck.name : 'No deck selected';
      document.getElementById('syncStatus').textContent = formatDateTime(appState.lastLoadedAt);
      document.getElementById('totalCardsStat').textContent = deck ? deck.cards.length : 0;
      document.getElementById('remainingCardsStat').textContent = deck ? getRemainingCards(deck).length : 0;
      document.getElementById('finishedCardsStat').textContent = deck ? getFinishedCount(deck) : 0;
      document.getElementById('studiedTodayStat').textContent = deck ? getStudiedToday(deck.id) : 0;
    }

    function renderStudy() {
      const deck = getSelectedDeck();
      const studyEmpty = document.getElementById('studyEmpty');
      const studyEmptyMessage = document.getElementById('studyEmptyMessage');
      const centerStartBtn = document.getElementById('centerStartBtn');
      const studyArea = document.getElementById('studyArea');
      const promptWord = document.getElementById('promptWord');
      const cardProgressText = document.getElementById('cardProgressText');
      const sessionProgressText = document.getElementById('sessionProgressText');
      const answerInput = document.getElementById('answerInput');
      const submitAnswerBtn = document.getElementById('submitAnswerBtn');
      const nextCardBtn = document.getElementById('nextCardBtn');
      const feedbackBox = document.getElementById('feedbackBox');

      if (appState.loading) {
        studyEmpty.classList.remove('hidden');
        studyArea.classList.add('hidden');
        studyEmptyMessage.textContent = 'Loading decks...';
        centerStartBtn.classList.add('hidden');
        return;
      }

      if (!deck) {
        studyEmpty.classList.remove('hidden');
        studyArea.classList.add('hidden');
        studyEmptyMessage.textContent = appState.loadError ? 'Could not load cards.' : 'Choose a deck when one becomes available.';
        centerStartBtn.classList.add('hidden');
        return;
      }

      if (!appState.activeStudyCardId) {
        studyEmpty.classList.remove('hidden');
        studyArea.classList.add('hidden');
        const remaining = getRemainingCards(deck).length;
        if (remaining > 0) {
          studyEmptyMessage.textContent = '';
          centerStartBtn.classList.remove('hidden');
        } else {
          studyEmptyMessage.textContent = 'Everything in this deck is finished.';
          centerStartBtn.classList.add('hidden');
        }
        return;
      }

      const card = getCardById(deck, appState.activeStudyCardId);
      if (!card) {
        studyEmpty.classList.remove('hidden');
        studyArea.classList.add('hidden');
        studyEmptyMessage.textContent = 'Session complete.';
        centerStartBtn.classList.add('hidden');
        return;
      }

      studyEmpty.classList.add('hidden');
      studyArea.classList.remove('hidden');
      promptWord.textContent = card.front;
      cardProgressText.textContent = `Right: ${Math.min(card.correctCount, 3)} / 3`;
      sessionProgressText.textContent = `${appState.studyQueue.length} card${appState.studyQueue.length === 1 ? '' : 's'} in session queue`;
      answerInput.disabled = appState.awaitingNext;
      submitAnswerBtn.disabled = appState.awaitingNext;
      nextCardBtn.disabled = !appState.awaitingNext;
      nextCardBtn.classList.toggle('primary', appState.awaitingNext);

      if (appState.feedback) {
        feedbackBox.classList.remove('hidden');
        feedbackBox.classList.toggle('good', appState.feedback.type === 'good');
        feedbackBox.classList.toggle('bad', appState.feedback.type === 'bad');
        feedbackBox.innerHTML = appState.feedback.html;
      } else {
        feedbackBox.classList.add('hidden');
        feedbackBox.classList.remove('good', 'bad');
        feedbackBox.innerHTML = '';
      }

      if (!appState.awaitingNext) {
        setTimeout(() => answerInput.focus(), 0);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatCellText(value) {
      return escapeHtml(value).replace(/\n/g, '<br>');
    }

    function renderCardTable() {
      const deck = getSelectedDeck();
      const panel = document.getElementById('cardsPanel');
      const empty = document.getElementById('cardTableEmpty');
      const wrap = document.getElementById('cardTableWrap');
      const body = document.getElementById('cardTableBody');
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      body.innerHTML = '';

      const hideDuringSession = !!(appState.sessionStarted && deck && getRemainingCards(deck).length > 0);
      panel.classList.toggle('hidden', hideDuringSession);
      if (hideDuringSession) return;

      if (!deck) {
        empty.classList.remove('hidden');
        wrap.classList.add('hidden');
        empty.textContent = appState.loadError ? 'No cards loaded because cards.json could not be read.' : 'No cards loaded.';
        return;
      }

      const filtered = getCardsWithProgress(deck).filter(card => {
        if (!query) return true;
        return card.front.toLowerCase().includes(query) || card.back.toLowerCase().includes(query);
      });

      if (filtered.length === 0) {
        empty.classList.remove('hidden');
        wrap.classList.add('hidden');
        empty.textContent = query ? 'No matching cards.' : 'No cards in this deck.';
        return;
      }

      empty.classList.add('hidden');
      wrap.classList.remove('hidden');

      filtered.forEach(card => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${formatCellText(card.front)}</td>
          <td>${formatCellText(card.back)}</td>
          <td>${card.correctCount || 0}</td>
          <td>${card.wrongAttempts || 0}</td>
        `;
        body.appendChild(tr);
      });
    }

    function render() {
      renderDeckList();
      renderStats();
      renderStudy();
      renderCardTable();
    }

    function bindEvents() {
      document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
      document.getElementById('centerStartBtn').addEventListener('click', startStudy);
      document.getElementById('searchInput').addEventListener('input', renderCardTable);
      document.getElementById('submitAnswerBtn').addEventListener('click', submitAnswer);
      document.getElementById('nextCardBtn').addEventListener('click', nextCard);
      document.getElementById('answerInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (appState.awaitingNext) {
            nextCard();
          } else {
            submitAnswer();
          }
        }
      });
    }

    loadProgress();
    bindEvents();
    loadMasterDecks();
  </script>
</body>
</html>
